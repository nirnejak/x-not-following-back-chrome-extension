<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      max-height: 520px;
      background: #000;
      color: #e7e9ea;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
    }

    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #2f3336;
      font-weight: 700;
      font-size: 18px;
    }

    #status {
      padding: 24px 16px;
      text-align: center;
      color: #71767b;
      line-height: 1.5;
    }

    #summary {
      padding: 12px 16px;
      border-bottom: 1px solid #2f3336;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }

    .stat-row span {
      color: #71767b;
    }

    .warning {
      margin-top: 8px;
      padding: 8px;
      background: #2a2000;
      border: 1px solid #ffd400;
      border-radius: 8px;
      color: #ffd400;
      font-size: 12px;
      line-height: 1.4;
    }

    #results {
      overflow-y: auto;
      max-height: 360px;
    }

    .user-list {
      display: flex;
      flex-direction: column;
    }

    .user-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }

    .user-row:hover {
      background: #181818;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    .name {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .handle {
      color: #71767b;
      font-size: 13px;
    }

    .arrow {
      flex-shrink: 0;
      color: #71767b;
    }

    .cache-label {
      margin-top: 6px;
      font-size: 12px;
      color: #71767b;
      text-align: right;
    }

    #rescan {
      display: none;
      width: calc(100% - 32px);
      margin: 10px 16px;
      padding: 8px;
      background: none;
      border: 1px solid #2f3336;
      border-radius: 20px;
      color: #e7e9ea;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #rescan:hover {
      background: #181818;
    }
  </style>
</head>
<body>
  <div class="header">Not Following Back</div>
  <div id="status">Loading...</div>
  <div id="summary"></div>
  <button id="rescan">Rescan</button>
  <div id="results"></div>
  <script src="popup.js"></script>
</body>
</html>
